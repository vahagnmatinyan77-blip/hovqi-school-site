backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "news"
    label: "Նորություններ"
    folder: "news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Վերնագիր", name: "title", widget: "string" }
      - { label: "Նկար", name: "image", widget: "image" }
      - { label: "Տեքստ", name: "body", widget: "markdown" }